<div class="flex h-auto gap-2">
    <div class="w-1/4 flex flex-col bg-gray-900">
        <div class="text-white p-2 overflow-auto h-200">
            @if(proyecto()){
                <app-archivo [archivoNodo]="proyecto()!" (crear)="abrirCrear($event)" (abrirArchivo)="abrirArchivo($event)"
                (eliminar)="abrirEliminar($event)"></app-archivo>
            }
        </div>
        <div class="flex justify-center gap-2 p-4 border-t border-gray-700">
            <app-boton texto="descargar arbol de trabajo" (click)="descargarArbol()"></app-boton>
            <app-boton texto="compilar y descargar" (click)="compilar()"></app-boton>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <app-editor [archivo]="archivoActual()" [contenido]="contenidoArchivo()"></app-editor>
    </div>

    @if(mostrarCrear()){
    <app-crear-archivo [padre]="archivoSeleccionado()!" (cerrar)="mostrarCrear.set(false)"
        (creado)="creado()"></app-crear-archivo>
    }

    @if(mostrarEliminar()){
    <app-eliminar-archivo [archivoNodo]="archivoSeleccionado()!" (cerrar)="mostrarEliminar.set(false)"
        (eliminado)="eliminado()"></app-eliminar-archivo>
    }
</div>
