<button [type]="tipoBoton()" class="group relative inline-block text-sm font-medium text-indigo-600">

        class="absolute inset-0 translate-x-0.5 translate-y-0.5 bg-indigo-600 transition-transform group-hover:translate-x-0 group-hover:translate-y-0"></span>
    <span class="relative block border border-current bg-white px-8 py-3"> {{texto()}} </span>
</button>
